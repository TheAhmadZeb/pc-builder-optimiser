<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildLogicPCS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header class="topbar">
        <div class="topbar-left">

            <!-- MENU BUTTON -->
            <button class="menu-button" onclick="toggleMenu()">☰</button>

            <!-- CLICKABLE LOGO -->
            <a href="{{ url_for('home') }}" class="brand-wrap" style="text-decoration: none; color: inherit;">
                <img src="{{ url_for('static', filename='assets/logo_icon.png') }}" alt="BuildLogicPCS logo" class="brand-icon">
                <span class="brand-text">
                    BUILD<span class="accent-gradient">LOGIC</span>PCS
                </span>
            </a>

            <!-- DROPDOWN MENU -->
            <div id="dropdownMenu" class="dropdown-menu">
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('new_build') }}">New Build</a>
                <a href="{{ url_for('upgrade') }}">Upgrade a Build</a>
            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="topbar-right">
        </div>
    </header>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>

    <!-- DROPDOWN SCRIPT -->
    <script>
        function toggleMenu() {
            document.getElementById("dropdownMenu").classList.toggle("show");
        }

        window.addEventListener("click", function(event) {
            const menu = document.getElementById("dropdownMenu");
            const button = document.querySelector(".menu-button");

            if (!menu.contains(event.target) && !button.contains(event.target)) {
                menu.classList.remove("show");
            }
        });
    </script>

</body>
</html>
